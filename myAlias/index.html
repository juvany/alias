<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>פתקים</title>
  <meta name="theme-color" content="#6C63FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="פתקים">
  <link rel="manifest" href="manifest.json">
  <script>
    // Capture beforeinstallprompt early so the deferred module doesn't miss it.
    // Only suppress Chrome's native mini-infobar on mobile where we show our own banner.
    window.addEventListener('beforeinstallprompt', function(e) {
      window.__pwaPrompt = e;
      var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches
                         || !!window.navigator.standalone;
      var isDismissed = false;
      try {
        var ts = localStorage.getItem('pwa_install_dismissed_v2');
        isDismissed = !!ts && (Date.now() - Number(ts) < 604800000); // 7 days
      } catch(ex) {}
      if (isMobile && !isStandalone && !isDismissed) {
        e.preventDefault(); // suppress Chrome's mini-infobar; we'll show our own
      }
    });
  </script>
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg: #f0f2ff;
      --surface: #ffffff;
      --card: #ffffff;
      --card2: #f0f2ff;
      --text: #1a1a3e;
      --text-dim: #5555aa;
      --text-muted: #9999cc;
      --border: #dde0f8;
      --correct: #16a34a;
      --skip-color: #dc2626;
      --t1: #16a34a; --t1d: #dcfce7;
      --t2: #65a30d; --t2d: #ecfccb;
      --t3: #ca8a04; --t3d: #fef9c3;
      --t4: #ea580c; --t4d: #ffedd5;
      --t5: #dc2626; --t5d: #fee2e2;
      --t6: #7c3aed; --t6d: #f3e8ff;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ===== SCREEN BASE ===== */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      animation: screenIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes screenIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .screen-inner {
      width: 100%;
      max-width: 480px;
      padding: 16px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      overflow-y: auto;
    }

    /* ===== BUTTONS ===== */
    .btn {
      border: none;
      border-radius: 16px;
      padding: 13px 24px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
      font-family: inherit;
      direction: rtl;
      width: 100%;
      max-width: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.95); filter: brightness(0.9); }
    .btn-primary {
      background: linear-gradient(135deg, #6C63FF 0%, #9B59B6 100%);
      color: #fff;
      box-shadow: 0 8px 32px rgba(108,99,255,0.35);
    }
    .btn-secondary {
      background: var(--card);
      color: var(--text-dim);
      border: 1.5px solid var(--border);
    }
    .btn-correct {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
      font-size: 1.8rem;
      padding: 28px;
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(34,197,94,0.35);
      flex: 2;
    }
    .btn-skip {
      background: #fff0f0;
      color: var(--skip-color);
      border: 2px solid rgba(220,38,38,0.3);
      font-size: 1.3rem;
      padding: 22px;
      border-radius: 18px;
      flex: 1;
    }
    .btn-ghost {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 0.95rem;
      cursor: pointer;
      padding: 8px;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-ghost:active { opacity: 0.6; }

    /* ===== SPACERS ===== */
    .spacer { flex: 1; }
    .gap4 { height: 4px; }
    .gap8 { height: 6px; }
    .gap12 { height: 8px; }
    .gap16 { height: 10px; }
    .gap20 { height: 14px; }
    .gap24 { height: 14px; }
    .gap32 { height: 18px; }
    .gap40 { height: 20px; }

    /* ===== DIVIDER ===== */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    /* ===== PILL BADGE ===== */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* ===== HOME SCREEN ===== */
    .home-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(108,99,255,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(155,89,182,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 48px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6C63FF, #9B59B6);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      box-shadow: 0 16px 48px rgba(108,99,255,0.4);
      animation: logoFloat 3s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .logo-text {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #a78bfa, #6C63FF, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .logo-subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
      text-align: center;
    }

    /* ===== SETUP SCREEN ===== */
    .section-label {
      width: 100%;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .team-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .team-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .team-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      direction: rtl;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .team-input:focus { border-color: #6C63FF; }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: color 0.2s;
    }
    .remove-btn:hover { color: var(--skip-color); }

    .add-team-btn {
      width: 100%;
      padding: 13px;
      background: none;
      border: 2px dashed var(--border);
      border-radius: 14px;
      color: var(--text-dim);
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
    }
    .add-team-btn:hover { border-color: #6C63FF; color: #a78bfa; }

    .options-row {
      width: 100%;
      display: flex;
      gap: 10px;
    }

    .option-card {
      flex: 1;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .option-card.active {
      background: rgba(108,99,255,0.15);
      border-color: #6C63FF;
    }
    .option-card-label {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .option-card-val {
      font-size: 1.4rem;
      font-weight: 800;
    }

    .toggle-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--card);
      border-radius: 14px;
    }
    .toggle-label { font-size: 0.95rem; }
    .toggle-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

    .toggle {
      position: relative;
      width: 50px;
      height: 28px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 28px;
      cursor: pointer;
      transition: 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      right: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #6C63FF; }
    input:checked + .slider::before { transform: translateX(-22px); }

    /* ===== BOARD SCREEN ===== */
    .board-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .board-title { font-size: 1.1rem; font-weight: 800; }
    .round-badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 5px 14px;
      font-size: 0.8rem;
      color: var(--text-dim);
      font-weight: 600;
    }

    /* Track */
    .track-wrapper {
      width: 100%;
      overflow-x: auto;
      padding: 16px 0;
      scrollbar-width: none;
    }
    .track-wrapper::-webkit-scrollbar { display: none; }

    .track {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 20px;
      width: max-content;
    }

    .track-tile {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.2rem;
      position: relative;
      flex-shrink: 0;
      transition: transform 0.2s;
      border: 2px solid transparent;
    }

    .track-tile.tile-start {
      background: var(--card);
      border-color: var(--border);
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-dim);
    }

    .track-tile.tile-end {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a0a00;
      font-size: 0.75rem;
      font-weight: 800;
      border-color: rgba(255,200,0,0.5);
      box-shadow: 0 4px 16px rgba(255,165,0,0.3);
    }

    .tile-d1 { background: #16a34a; color: #fff; border-color: #15803d; }
    .tile-d2 { background: #65a30d; color: #fff; border-color: #4d7c0f; }
    .tile-d3 { background: #ca8a04; color: #fff; border-color: #a16207; }
    .tile-d4 { background: #ea580c; color: #fff; border-color: #c2410c; }
    .tile-d5 { background: #dc2626; color: #fff; border-color: #b91c1c; }
    .tile-d6 { background: #7c3aed; color: #fff; border-color: #6d28d9; }

    .track-tile.active-tile {
      transform: scale(1.12);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.8), 0 8px 24px rgba(108,99,255,0.3);
    }

    .tile-teams {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
    }

    .tile-team-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--bg);
    }

    .track-arrow {
      color: var(--text-muted);
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    /* Team cards on board */
    .team-cards-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .team-board-card {
      width: 100%;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.3s, background 0.3s;
    }

    .team-board-card.active-team {
      border-color: var(--active-team-color, rgba(108,99,255,0.6));
      background: var(--active-team-bg, rgba(108,99,255,0.08));
    }

    .team-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }

    .team-info { flex: 1; }
    .team-name-text { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
    .team-tile-info { font-size: 0.78rem; color: var(--text-dim); }

    .team-score-display {
      font-size: 1.8rem;
      font-weight: 900;
      min-width: 40px;
      text-align: center;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .current-turn-bar {
      width: 100%;
      background: linear-gradient(135deg, rgba(108,99,255,0.08), rgba(155,89,182,0.05));
      border: 2px solid rgba(108,99,255,0.2);
      border-radius: 18px;
      padding: 16px;
      text-align: center;
    }
    .current-turn-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; }
    .current-turn-name { font-size: 1.5rem; font-weight: 900; }
    .current-turn-sub { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

    /* ===== TURN INTRO SCREEN ===== */
    .turn-intro-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
    }

    .turn-team-display {
      width: 120px;
      height: 120px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      color: white;
      animation: teamPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes teamPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .turn-team-name {
      font-size: 2rem;
      font-weight: 900;
    }

    .turn-difficulty-card {
      background: var(--card);
      border-radius: 16px;
      padding: 14px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border: 1.5px solid var(--border);
    }

    .diff-label { font-size: 0.78rem; color: var(--text-dim); }
    .diff-stars { font-size: 1.4rem; letter-spacing: 2px; }
    .diff-name { font-size: 1rem; font-weight: 700; }

    .turn-instructions {
      font-size: 0.88rem;
      color: var(--text-dim);
      max-width: 280px;
      line-height: 1.6;
    }

    /* ===== PLAYING SCREEN ===== */
    .playing-wrap {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .playing-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 8px;
    }

    .playing-team-badge {
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
    }

    .playing-score {
      font-size: 0.9rem;
      color: var(--text-dim);
      font-weight: 600;
    }

    /* Circular Timer */
    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 20px;
      gap: 8px;
    }

    .timer-circle-wrap {
      position: relative;
      width: 90px;
      height: 90px;
    }

    .timer-svg {
      width: 90px;
      height: 90px;
      transform: rotate(-90deg);
    }

    .timer-bg-circle {
      fill: none;
      stroke: var(--border);
      stroke-width: 6;
    }

    .timer-progress-circle {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.5s;
    }

    .timer-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 900;
      transition: color 0.5s;
    }

    .turn-mini-stats {
      display: flex;
      gap: 20px;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .stat-ok { color: var(--correct); }
    .stat-sk { color: var(--skip-color); }

    /* Word Card */
    .word-card {
      flex: 1;
      margin: 0 20px;
      background: var(--card);
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 24px;
      position: relative;
      overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: 0 4px 24px rgba(108,99,255,0.1);
      transition: background 0.25s;
    }

    .word-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(108,99,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .word-diff-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .word-text {
      font-size: clamp(2rem, 9vw, 3.2rem);
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      animation: wordIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes wordIn {
      from { opacity: 0; transform: scale(0.85) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .word-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 16px;
      text-align: center;
    }

    .word-card.flash-correct {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34,197,94,0.4);
    }
    .word-card.flash-skip {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239,68,68,0.3);
    }

    .action-btns {
      display: flex;
      gap: 12px;
      padding: 16px 20px 32px;
    }

    /* ===== TURN RESULTS ===== */
    .results-points-banner {
      width: 100%;
      text-align: center;
      background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(155,89,182,0.1));
      border: 1.5px solid rgba(108,99,255,0.3);
      border-radius: 22px;
      padding: 24px;
    }

    .results-points-label { font-size: 0.85rem; color: var(--text-dim); }
    .results-points-number { font-size: 4rem; font-weight: 900; line-height: 1; }
    .results-points-sub { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

    .results-list { width: 100%; }

    .result-word-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--card);
      border-radius: 12px;
      margin-bottom: 7px;
      font-size: 0.95rem;
    }

    .result-icon { font-size: 1rem; flex-shrink: 0; }

    /* Scores table */
    .scores-wrap { width: 100%; }

    .score-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 8px;
      border: 1.5px solid var(--border);
    }

    .score-item.leader {
      border-color: rgba(255,215,0,0.5);
      background: rgba(255,215,0,0.06);
    }

    .score-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .score-name { flex: 1; font-weight: 700; font-size: 0.95rem; }
    .score-pos { font-size: 0.75rem; color: var(--text-dim); }
    .score-pts { font-size: 1.6rem; font-weight: 900; }

    /* ===== WIN SCREEN ===== */
    .win-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 10px;

    .win-stars {

      width: 110px; height: 110px;
      border-radius: 30px;

      font-size: 3.5rem;
      position: relative;
      z-index: 1;
    }

      inset: -12px;
      border-radius: 38px;
      opacity: 0.35;
      filter: blur(18px);
      z-index: 0;
      animation: winPulseGlow 2s ease-in-out infinite;
    }

    .win-trophy {
      font-size: 4rem;
      animation: winTrophyIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      animation-delay: 0.5s;
      position: absolute;
      bottom: -14px;
      right: -18px;
      z-index: 2;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.25));

    .win-subtitle {
      font-size: 0.95rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 600;
      animation: winFadeUp 0.6s ease both;
      animation-delay: 0.6s;
    }

    .win-team-name {
      font-size: 2.8rem;
      font-weight: 900;
      animation: winNameIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      animation-delay: 0.75s;
      line-height: 1.15;
    }

    .win-players {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      animation: winFadeUp 0.6s ease both;
      animation-delay: 1s;
    }

    .win-player-chip {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1.5px solid;
    }

    .win-reached {
      font-size: 0.85rem;
      color: var(--text-dim);
      animation: winFadeUp 0.6s ease both;
      animation-delay: 1.1s;
    }

    .win-divider {
      width: 60px;
      height: 3px;
      border-radius: 3px;
      margin: 6px 0;
      animation: winFadeUp 0.6s ease both;
      animation-delay: 1.2s;
    }

    @keyframes winAvatarIn {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0); opacity: 1; }
    }
    @keyframes winTrophyIn {
      from { transform: scale(0) rotate(20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0); opacity: 1; }
    }
    @keyframes winNameIn {
      from { transform: scale(0.5) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes winFadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }

    @keyframes winPulseGlow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(1.08); }

    /* ===== DIFFICULTY COLORS ===== */
    .d1 { color: #16a34a; }
    .d2 { color: #65a30d; }
    .d3 { color: #ca8a04; }
    .d4 { color: #ea580c; }
    .d5 { color: #dc2626; }
    .d6 { color: #7c3aed; }

    /* ===== INSTRUCTIONS ===== */
    .instructions-card {
      width: 100%;
      background: var(--card);
      border-radius: 18px;
      padding: 12px 14px;
      margin-bottom: 12px;
      border: 1.5px solid var(--border);
    }

    .instructions-card h3 {
      font-size: 1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .instructions-card p, .instructions-card li {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .instructions-card ul { padding-right: 16px; }

    /* ===== CONFETTI CANVAS ===== */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
    }

    /* ===== DIFFICULTY LEGEND ===== */
    .diff-legend {
      width: 100%;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .diff-badge {
      flex: 1;
      min-width: 80px;
      padding: 8px;
      border-radius: 10px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
    }

    /* ===== TRAIL BOARD ===== */
    .trail-board-outer { width:100%; padding:6px 0 8px; }
    .trail-board-bg {
      background: var(--bg);
      border-radius: 20px;
      padding: 12px 14px 10px;
      width: 100%;
      border: 1.5px solid var(--border);
    }
    .trail-board { width:100%; display:flex; flex-direction:column; gap:0; }
    .trail-row   { display:flex; align-items:center; justify-content:center; }

    /* circular tile */
    .trail-tile  {
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; flex-shrink: 0;
      border: 3px solid rgba(255,255,255,0.4);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
      font-size: 0.85rem; font-weight: 900; color: #fff;
      transition: transform 0.15s;
    }
    .trail-tile .tile-num {
      font-size: 0.85rem; font-weight: 900; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6); line-height: 1; z-index: 1;
    }
    .trail-start-tile {
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff 0%, #ddd 100%);
      border: 3px solid rgba(255,255,255,0.5);
      box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.8);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; flex-shrink: 0;
      font-size: 0.5rem; font-weight: 900; letter-spacing: 0.04em; color: #8B0000;
    }

    /* tile colors — now with glossy radial highlight */
    .tile-d1 { background: radial-gradient(circle at 35% 35%, #4ade80 0%, #16a34a 100%); border-color: rgba(255,255,255,0.3); }
    .tile-d2 { background: radial-gradient(circle at 35% 35%, #a3e635 0%, #65a30d 100%); border-color: rgba(255,255,255,0.3); }
    .tile-d3 { background: radial-gradient(circle at 35% 35%, #fde047 0%, #ca8a04 100%); border-color: rgba(255,255,255,0.3); }
    .tile-d4 { background: radial-gradient(circle at 35% 35%, #fb923c 0%, #ea580c 100%); border-color: rgba(255,255,255,0.3); }
    .tile-d5 { background: radial-gradient(circle at 35% 35%, #f87171 0%, #dc2626 100%); border-color: rgba(255,255,255,0.3); }
    .tile-d6 { background: radial-gradient(circle at 35% 35%, #c084fc 0%, #7c3aed 100%); border-color: rgba(255,255,255,0.3); }

    .just-moved { animation: justMoved 1.6s ease forwards; z-index: 4; }
    @keyframes justMoved {
      0%   { box-shadow: 0 3px 6px rgba(0,0,0,0.4); transform: scale(1); }
      20%  { box-shadow: 0 0 0 7px gold, 0 3px 6px rgba(0,0,0,0.4); transform: scale(1.35); }
      60%  { box-shadow: 0 0 0 5px gold, 0 3px 6px rgba(0,0,0,0.4); transform: scale(1.2); }
      100% { box-shadow: 0 0 0 4px gold, 0 3px 6px rgba(0,0,0,0.4); transform: scale(1.15); }
    }
    .path-hl { filter: brightness(1.25); box-shadow: 0 0 0 3px rgba(255,215,0,0.6), 0 3px 6px rgba(0,0,0,0.4); }

    .bonus-moved { animation: bonusMoved 1.4s ease 0.6s both; z-index: 4; }

      0%   { box-shadow: 0 3px 6px rgba(0,0,0,0.4); transform: scale(1); }

      60%  { box-shadow: 0 0 0 4px #38bdf8, 0 3px 6px rgba(0,0,0,0.4); transform: scale(1.15); }
      100% { box-shadow: 0 0 0 3px #38bdf8, 0 3px 6px rgba(0,0,0,0.4); transform: scale(1.1); }
    }

    /* pawn avatars sitting on top of tiles */
    .tile-avatars { position: absolute; inset: 0; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; pointer-events: none; z-index: 3; }

    .tile-tokens { position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); display:flex; gap:2px; z-index:3; }

    .dob.dob-active { background:rgba(108,99,255,0.15); border-color:#6C63FF; color:#a78bfa; }

    .lang-btns { display:flex; gap:5px; }

    .game-menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,0); z-index:200; display:flex; align-items:flex-end; justify-content:center; padding:20px; transition:background 0.25s; pointer-events:none; }

    .screen::-webkit-scrollbar { width: 4px; }

    @media (min-width: 769px) {

      .btn { max-width: 480px; font-size: 1.15rem; padding: 18px 36px; }

      .logo-icon { width: 96px; height: 96px; font-size: 2.8rem; }
      .logo-text { font-size: 3.6rem; }

      .board-layout {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 24px;
        align-items: start;
        width: 100%;
      }
      .board-right { position: sticky; top: 36px; }

      .setup-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 32px;
        align-items: start;
        width: 100%;
        overflow: hidden;
      }
      .setup-left { overflow-y: auto; min-height: 0; }
      .setup-right { position: sticky; top: 36px; }

      .playing-wrap { max-width: 800px; margin: 0 auto; }
      .word-text { font-size: clamp(2.5rem, 7vw, 5rem); }

      .timer-svg { width: 120px; height: 120px; }
      .timer-number { font-size: 2.4rem; }
      .timer-bg-circle, .timer-progress-circle { stroke-width: 7; }
      .action-btns { padding: 20px 40px 40px; gap: 20px; }
      .btn-correct { font-size: 2.2rem; padding: 34px; }
      .btn-skip { font-size: 1.5rem; padding: 28px; }

      /* Turn intro: bigger */
      .turn-team-display { width: 160px; height: 160px; font-size: 4rem; border-radius: 40px; }
      .turn-team-name { font-size: 2.8rem; }

      /* Win: bigger */
      .win-avatar { width: 140px; height: 140px; font-size: 4.5rem; border-radius: 36px; }
      .win-avatar-glow { inset: -16px; border-radius: 44px; filter: blur(24px); }
      .win-trophy { font-size: 5rem; bottom: -18px; right: -22px; }
      .win-team-name { font-size: 3.5rem; }
      .win-stars { font-size: 1.8rem; letter-spacing: 10px; }

    .mode-cards {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 400px;
      flex-direction: column;

      flex: 1;
      background: var(--card);

      padding: 24px 20px;

      gap: 16px;
      cursor: pointer;
      border: 2px solid var(--border);

    .mode-card:active { transform: scale(0.97); }
    .mode-card:hover { border-color: #6C63FF; box-shadow: 0 8px 28px rgba(108,99,255,0.18); }
    .mode-card-icon {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }
    .mode-card-info { flex: 1; min-width: 0; }
    .mode-card-title {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .mode-card-desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.4;
    }
    .mode-card-arrow {
      font-size: 1.2rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
  </style>

  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDifficulty(position) {
  if (position <= 0) return 1;
  if (position >= G.settings.targetSteps) return 4;
  return (G.tileLayout || TILE_DIFFICULTY)[position - 1] || 1;
}

function getTeamDiff(teamIdx, position) {
  const base = getDifficulty(position);
  const offset = (G.teams[teamIdx] || {}).diffOffset || 0;
  return Math.min(4, Math.max(1, base + offset));
}

function getExplainerName(teamIdx) {
  const team = G.teams[teamIdx];
  if (!team || !team.players || team.players.length === 0) return null;
  return team.players[team.explainerIdx % team.players.length] || null;
}

// Build a TRAIL board: red background, circular tiles, emoji pawns
function buildTrailBoard({ highlightTeamIdx = null, pathFrom = null, pathTo = null, tileSize = 0, bonusTeamIdx, bonusFrom } = {}) {
  const total = G.settings.targetSteps;
  const cols  = total / 5;   // 5 rows  (40→8 cols … 65→13 cols)

  // Compute tile size so the full row fits exactly in the available width.
  // CW = tileSize * CW_RATIO (minimum 6px), so:
  //   availW = cols * tileSize + (cols-1) * max(6, tileSize * CW_RATIO)
  // Solve assuming CW_RATIO dominates (check min afterwards):
  //   tileSize = availW / (cols + CW_RATIO * (cols - 1))
  if (!tileSize) {
    const boardPad  = 28;  // trail-board-bg L+R padding
    const isDesktop = window.innerWidth >= 769;
    let containerW;
    if (isDesktop) {
      const screenW  = Math.min(window.innerWidth, 1100);
      const contentW = screenW - 96;   // screen-inner padding 48*2
      containerW     = contentW - 300 - 24; // minus right col + gap
    } else {
      containerW = Math.min(window.innerWidth, 480) - 40; // screen-inner padding
    }
    const availW   = containerW - boardPad;
    const CW_RATIO = 0.26;
    tileSize = Math.max(20, Math.floor(availW / (cols + CW_RATIO * (cols - 1))));
  }

  const CW = Math.max(6, Math.floor(tileSize * 0.26));  // connector width
  const CV = Math.max(10, Math.floor(tileSize * 0.38)); // vertical connector height

  const connectorStyle = `width:${CW}px;height:${tileSize}px;display:flex;align-items:center;
    justify-content:center;color:rgba(0,0,0,0.25);font-size:0.95rem;
    font-weight:900;flex-shrink:0;line-height:1;`;

  let html = '<div class="trail-board">';

  for (let d = 0; d < 5; d++) {
    const r       = 4 - d;
    const startT  = r * cols + 1;
    const endT    = (r + 1) * cols;
    const goRight = r % 2 === 0;

    const tiles = goRight
      ? Array.from({length: cols}, (_, i) => startT + i)
      : Array.from({length: cols}, (_, i) => endT - i);

    html += '<div class="trail-row">';
    tiles.forEach((tile, idx) => {
      const dl        = (G.tileLayout || TILE_DIFFICULTY)[tile - 1] || 4;
      const isEnd     = tile === total;
      const teamsHere = G.teams.filter(t => t.position === tile);
      const isJust    = highlightTeamIdx !== null && tile === pathTo;
      const isPath    = highlightTeamIdx !== null && pathFrom !== null
                        && tile > pathFrom && tile < pathTo;
      const isBonusJust = bonusTeamIdx != null && tile === (bonusFrom != null ? bonusFrom + 1 : -1);

      const cls = `trail-tile tile-d${dl}${isJust ? ' just-moved' : isPath ? ' path-hl' : ''}${isBonusJust ? ' bonus-moved' : ''}`;
      const hasPawns  = teamsHere.length > 0;
      const avSize    = teamsHere.length > 1 ? ' small' : '';
      const avs       = teamsHere.map(t => `<div class="tile-avatar${avSize}">${t.emoji}</div>`).join('');
      const numFS     = Math.max(0.55, tileSize / 52).toFixed(2) + 'rem';
      const avFS      = Math.max(0.85, tileSize / 36).toFixed(2) + 'rem';
      const avFSsmall = Math.max(0.65, tileSize / 48).toFixed(2) + 'rem';

      html += `<div class="${cls}" id="gtile-${tile}" style="width:${tileSize}px;height:${tileSize}px;">
        ${isEnd
          ? `<span style="font-size:${avFS};z-index:3;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.8));">🏁</span>`
          : hasPawns
            ? `<div class="tile-avatars" style="--av-fs:${avFS};--av-fs-sm:${avFSsmall};">${avs}</div>`
            : `<span class="tile-num" style="font-size:${numFS};">${tile}</span>`
        }
      </div>`;

      if (idx < cols - 1) {
        html += `<div style="${connectorStyle}">${goRight ? '▶' : '◀'}</div>`;
      }
    });
    html += '</div>';

    // vertical turn connector — align to the end tile of this row
    const connRight = (d % 2 !== 0); // connector is on right side when going R→L above
    const connJust  = connRight ? 'flex-end' : 'flex-start';
    html += `<div style="width:100%;height:${CV}px;display:flex;align-items:center;justify-content:${connJust};">
      <div style="width:${tileSize}px;height:${CV}px;display:flex;align-items:center;
                  justify-content:center;color:rgba(0,0,0,0.25);
                  font-size:${Math.max(0.7,tileSize/44).toFixed(2)}rem;font-weight:900;">▲</div>
    </div>`;
  }

  // START tile
  const atStart  = G.teams.filter(t => t.position === 0);
  const sAvFS    = Math.max(0.85, tileSize / 36).toFixed(2) + 'rem';
  const sAvFSsm  = Math.max(0.65, tileSize / 48).toFixed(2) + 'rem';
  const sAvSize  = atStart.length > 1 ? ' small' : '';
  const sAvs     = atStart.map(t => `<div class="tile-avatar${sAvSize}">${t.emoji}</div>`).join('');
  const sNumFS   = Math.max(0.42, tileSize / 64).toFixed(2) + 'rem';
  html += `<div class="trail-row" style="justify-content:flex-start;">
    <div class="trail-start-tile" style="width:${tileSize}px;height:${tileSize}px;">
      ${sAvs
        ? `<div class="tile-avatars" style="--av-fs:${sAvFS};--av-fs-sm:${sAvFSsm};">${sAvs}</div>`
        : `<span style="font-size:${sNumFS};font-weight:900;color:#8B0000;">START</span>`}
    </div>
  </div>`;

  html += '</div>'; // .trail-board
  return `<div class="trail-board-bg">${html}</div>`;
}

function drawWord(difficulty, lang) {
  lang = lang || 'he';
  const enabled = G.settings.enabledCategories || ['everyday'];
  // Use a single pool per language that combines ALL difficulty levels
  const cacheKey = lang + '_combined_' + [...enabled].sort().join(',');

  if (!G.wordPools[cacheKey] || G.wordPools[cacheKey].length === 0) {
    // Build a massive pool from ALL categories and ALL difficulty levels
    const merged = new Set();
    for (const cat of enabled) {
      const catData = CATEGORY_WORDS[lang]?.[cat] || {};
      // Add words from all difficulty levels (1-4)
      for (let d = 1; d <= 4; d++) {
        const catWords = catData[d];
        if (catWords) catWords.forEach(w => merged.add(w));
      }
    }
    // Also add everyday words from all levels
    const everyday = WORD_LISTS[lang] || WORDS;
    for (let d = 1; d <= 4; d++) {
      if (everyday[d]) everyday[d].forEach(w => merged.add(w));
    }
    G.wordPools[cacheKey] = shuffle([...merged]);
  }

  const pool = G.wordPools[cacheKey];
  // Filter out already-used words from the pool
  let idx = pool.length;
  while (idx--) {
    if (G.usedWords.has(pool[idx])) pool.splice(idx, 1);
  }

  let word, attempts = 0;
  do {
    if (pool.length === 0) {
      // Refill pool with ALL words, excluding used ones first
      const refill = new Set();
      for (const cat of enabled) {
        const catData = CATEGORY_WORDS[lang]?.[cat] || {};
        for (let d = 1; d <= 4; d++) {
          const catWords = catData[d];
          if (catWords) catWords.forEach(w => { if (!G.usedWords.has(w)) refill.add(w); });
        }
      }
      const everyday = WORD_LISTS[lang] || WORDS;
      for (let d = 1; d <= 4; d++) {
        if (everyday[d]) everyday[d].forEach(w => { if (!G.usedWords.has(w)) refill.add(w); });
      }
      // If ALL words exhausted, allow full reuse
      if (!refill.size) {
        G.usedWords.clear();
        for (const cat of enabled) {
          const catData = CATEGORY_WORDS[lang]?.[cat] || {};
          for (let d = 1; d <= 4; d++) {
            const catWords = catData[d];
            if (catWords) catWords.forEach(w => refill.add(w));
          }
        }
        const everyday2 = WORD_LISTS[lang] || WORDS;
        for (let d = 1; d <= 4; d++) {
          if (everyday2[d]) everyday2[d].forEach(w => refill.add(w));
        }
      }
      pool.push(...shuffle([...refill]));
    }
    word = pool.pop();
    attempts++;
  } while (BANNED_WORDS.has(lang + ':' + word) && attempts < 200);
  G.usedWords.add(word);
  return word;
}

/* =====================================================
   SAVE / RESUME GAME
   ===================================================== */
const SAVE_KEY = 'pwa_saved_game';

function saveGame() {
  if (!G.gameActive) return;
  try {
    const snapshot = JSON.parse(JSON.stringify(G));
    // Don't save timer interval (not serializable); pause the timer state
    if (snapshot.playing) {
      snapshot.playing.timerInterval = null;
      snapshot.playing.paused = true;
    }
    // Serialize usedWords Set as array so it can be restored
    snapshot.usedWords = [...(G.usedWords || [])];
    localStorage.setItem(SAVE_KEY, JSON.stringify(snapshot));
  } catch(e) {}
}

function hasSavedGame() {
  try { return !!localStorage.getItem(SAVE_KEY); } catch(e) { return false; }
}

function resumeSavedGame() {
  checkForUpdate();
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    // If saved while in settings, restore to the screen they came from
    if (['setup','gameOptions'].includes(saved.screen) && saved._returnScreen) {
      saved.screen = saved._returnScreen;
      saved._returnScreen = null;
    }
    // Restore usedWords as a Set (JSON serializes Set as {})
    if (saved.usedWords && !(saved.usedWords instanceof Set)) {
      saved.usedWords = new Set(Array.isArray(saved.usedWords) ? saved.usedWords : []);
    }
    Object.assign(G, saved);
    // Restore non-serializable defaults
    if (G.playing) {
      G.playing.timerInterval = null;
      G.playing.paused = true;
    }
    // If resuming mid-turn, show playing screen in paused state
    if (G.screen === 'playing' && G.playing) {
      render();
      // Visually show paused state: blur word, update button text
      const wc = document.getElementById('word-card');
      if (wc) wc.style.filter = 'blur(8px)';
      const pb = document.getElementById('pause-btn');
      if (pb) pb.textContent = TT(G.playing.lang || 'he', 'resume');
      ['btn-skip','btn-correct'].forEach(id => {
        const b = document.getElementById(id);
        if (b) { b.disabled = true; b.style.opacity = '0.35'; b.style.pointerEvents = 'none'; }
      });
    } else {
      render();
    }
  } catch(e) {}
}

function clearSavedGame() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function addTeam() {

  setupTeams.push({ name: (TEAM_EMOJI_NAMES_LIST()[i] || `${T('teams')} ${i+1}`), color: TEAM_COLORS[i], emoji: TEAM_EMOJIS[i], players: [], diffOffset: 0, lang: G.uiLang === 'he' ? 'he' : G.uiLang });
  renderSetup(document.getElementById("app"));
}

/* =====================================================
   SAVED PLAYER NAMES
   ===================================================== */
const SAVED_PLAYERS_KEY = 'alias_saved_players';
function getSavedPlayers() {
  try { return JSON.parse(localStorage.getItem(SAVED_PLAYERS_KEY) || '[]'); } catch(e) { return []; }
}
function savePlayers(names) {
  const existing = getSavedPlayers();
  const merged = [...new Set([...existing, ...names.map(n=>n.trim()).filter(Boolean)])];
  try { localStorage.setItem(SAVED_PLAYERS_KEY, JSON.stringify(merged)); } catch(e) {}
}
function deleteSavedPlayer(name) {
  const list = getSavedPlayers().filter(n => n !== name);
  try { localStorage.setItem(SAVED_PLAYERS_KEY, JSON.stringify(list)); } catch(e) {}
  renderTeamsList();
}
function addSavedPlayerToTeam(teamIdx, name) {
  if (!setupTeams[teamIdx].players.includes(name)) {
    setupTeams[teamIdx].players.push(name);
  }
  renderTeamsList();
}

function addPlayer(teamIdx) {
  setupTeams[teamIdx].players.push("");
  renderTeamsList();
}

function removePlayer(teamIdx, playerIdx) {
  setupTeams[teamIdx].players.splice(playerIdx, 1);
  renderTeamsList();
}

function setTeamOffset(teamIdx, val) {
  setupTeams[teamIdx].diffOffset = val;
  renderTeamsList();
}

function removeTeam(i) {
  setupTeams.splice(i, 1);
  renderSetup(document.getElementById("app"));
}

function setSetting(key, val) {
  G.settings[key] = val;
}

function selectTimer(val) {
  G.settings.timerSeconds = val;
  [30, 60, 90].forEach(s => {
    const btn = document.getElementById('timer-opt-' + s);
    if (!btn) return;
    const on = s === val;
    btn.style.borderColor = on ? '#6C63FF' : 'var(--border)';
    btn.style.background = on ? 'rgba(108,99,255,0.15)' : 'transparent';
    btn.style.color = on ? '#a78bfa' : 'var(--text-dim)';
  });
}

function toggleCategory(cat) {
  const enabled = G.settings.enabledCategories;
  const idx = enabled.indexOf(cat);
  if (idx >= 0) {
    if (enabled.length <= 1) return; // keep at least one
    enabled.splice(idx, 1);
  } else {
    enabled.push(cat);
  }
  G.wordPools = {}; // reset pools so new selection takes effect immediately
  // Update button style in-place
  const btn = document.getElementById('cat-btn-' + cat);
  const catDef = CATEGORIES[cat];
  if (btn && catDef) {
    const on = enabled.includes(cat);
    btn.style.borderColor = on ? catDef.color : 'var(--border)';
    btn.style.background = on ? catDef.color + '22' : 'transparent';
    btn.style.color = on ? catDef.color : 'var(--text-muted)';
  }
}

function startGame() {
  // Save all player names for future sessions
  const allNames = setupTeams.flatMap(t => t.players);
  savePlayers(allNames);

  G.teams = setupTeams.map(t => ({
    ...t,
    position: 0,
    prevPosition: 0,
    score: 0,
    players: [...t.players],
    explainerIdx: 0,
    diffOffset: t.diffOffset || 0,
    lang: t.lang || 'he'
  }));
  G.currentTeam = 0;
  G.turnNumber = 1;
  G.lastMove = null;
  G.wordPools = {};
  G.usedWords = new Set();
  G.tileLayout = generateRandomBoard(G.settings.targetSteps);
  G.gameActive = true;
  goto("board");
}

/* =====================================================

   ===================================================== */
function beginPlaying() {
  const ct = G.currentTeam;
  const diff = getTeamDiff(ct, G.teams[ct].position);
  const lang = G.teams[ct].lang || 'he';
  G.playing = {
    word: drawWord(diff, lang),
    difficulty: diff,
    lang: lang,
    timeLeft: G.settings.timerSeconds,
    timerInterval: null,
    correct: [],
    skipped: [],
    paused: false
  };
  G.screen = "playing";
  render();
  startPlayingTimer();
}

function startPlayingTimer() {
  if (G.playing.timerInterval) clearInterval(G.playing.timerInterval);
  G.playing.timerInterval = setInterval(() => {
    G.playing.timeLeft--;
    updateTimerUI();
    if (G.playing.timeLeft <= 0) {
      endTurn();
    }
  }, 1000);
}

function togglePause() {
  const setActionBtns = (disabled) => {
    ['btn-skip','btn-correct'].forEach(id => {
      const b = document.getElementById(id);
      if (!b) return;
      b.disabled = disabled;
      b.style.opacity = disabled ? '0.35' : '';
      b.style.pointerEvents = disabled ? 'none' : '';
    });
  };
  if (G.playing.paused) {
    G.playing.paused = false;
    startPlayingTimer();
    document.getElementById('pause-btn').textContent = TT(G.playing.lang, 'pause');
    const wc = document.getElementById('word-card');
    if (wc) wc.style.filter = '';
    setActionBtns(false);
  } else {
    G.playing.paused = true;
    clearInterval(G.playing.timerInterval);
    G.playing.timerInterval = null;
    document.getElementById('pause-btn').textContent = TT(G.playing.lang, 'resume');
    const wc = document.getElementById('word-card');
    if (wc) wc.style.filter = 'blur(8px)';
    setActionBtns(true);
    saveGame();
  }
}

const CIRCUMFERENCE = 2 * Math.PI * 36; // r=36

function updateTimerUI() {
  const t = G.playing.timeLeft;
  const total = G.settings.timerSeconds;
  const pct = t / total;
  const col = pct > 0.5 ? "#22c55e" : pct > 0.25 ? "#fbbf24" : "#ef4444";
  const offset = CIRCUMFERENCE * (1 - pct);

  const arc = document.getElementById("timer-arc");
  const num = document.getElementById("timer-num");
  const okEl = document.getElementById("stat-ok");
  const skEl = document.getElementById("stat-sk");

  if (arc) { arc.style.stroke = col; arc.setAttribute("stroke-dashoffset", offset); }
  if (num) { num.textContent = t; num.style.color = col; }
  if (okEl) okEl.textContent = G.playing.correct.length;
  if (skEl) skEl.textContent = G.playing.skipped.length;

  // Pulse on last 5 seconds
  if (t <= 5 && num) {
    num.style.animation = "none";
    num.offsetHeight;
    num.style.animation = "wordIn 0.25s ease";
  }
}

function handleCorrect() {
  G.playing.correct.push(G.playing.word);
  flashCard("flash-correct");
  nextWord();
}

function handleSkip() {
  G.playing.skipped.push(G.playing.word);
  flashCard("flash-skip");
  nextWord();
}

function flashCard(cls) {
  const card = document.getElementById("word-card");
  if (!card) return;
  card.classList.add(cls);
  setTimeout(() => card.classList.remove(cls), 300);
}

function nextWord() {
  G.playing.word = drawWord(G.playing.difficulty, G.playing.lang);
  const wordEl = document.getElementById("word-text");
  if (wordEl) {
    wordEl.style.animation = "none";
    wordEl.offsetHeight;
    wordEl.textContent = G.playing.word;
    wordEl.style.animation = "wordIn 0.3s cubic-bezier(0.34,1.56,0.64,1)";
  }
  updateTimerUI();
}

/* =====================================================
   END TURN
   ===================================================== */
function endTurn() {
  if (G.playing.timerInterval) {
    clearInterval(G.playing.timerInterval);
    G.playing.timerInterval = null;
  }
  G.playing.paused = false;

  const ct = G.currentTeam;
  const correct = G.playing.correct.length;
  const skipped = G.playing.skipped.length;
  const penalty = G.settings.skipPenalty ? skipped : 0;
  const advance = Math.max(0, correct - penalty);

  const from = G.teams[ct].position;
  G.teams[ct].score = (G.teams[ct].score || 0) + advance;
  G.teams[ct].position = Math.min(from + advance, G.settings.targetSteps);
  const to = G.teams[ct].position;

  if (G.teams[ct].players && G.teams[ct].players.length > 1) {
    G.teams[ct].explainerIdx = (G.teams[ct].explainerIdx + 1) % G.teams[ct].players.length;
  }

  G.lastMove = { teamIdx: ct, from, to };

  // Show bonus guess screen before results
  G.bonusWord = G.playing.word;
  G.bonusTeamIdx = null;
  G.screen = 'bonusGuess';
  render();
}

function applyBonusAndFinish(bonusTeamIdx) {
  if (bonusTeamIdx !== null && bonusTeamIdx !== G.currentTeam) {
    const bt = G.teams[bonusTeamIdx];
    G.bonusFrom = bt.position;
    bt.score = (bt.score || 0) + 1;
    bt.position = Math.min(bt.position + 1, G.settings.targetSteps);
    G.bonusTeamIdx = bonusTeamIdx;
    if (bt.position >= G.settings.targetSteps) {
      goto('win');
      return;
    }
  }
  if (G.teams[G.currentTeam].position >= G.settings.targetSteps) {
    goto('win');
    return;
  }
  goto('turnResults');
}

/* =====================================================
   CONFETTI
   ===================================================== */
function launchConfetti(primaryColor) {
  const canvas = document.getElementById("confetti-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = [primaryColor, "#FFD700", "#FF6B6B", "#4ade80", "#a78bfa", "#ffffff", "#fb923c", "#38bdf8", "#f472b6"];
  const shapes = ['rect', 'circle', 'star'];

  function makePiece(delay) {
    return {
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 300 - delay * 2,
      vx: (Math.random() - 0.5) * 7,
      vy: Math.random() * 3 + 1.5,
      size: Math.random() * 8 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: shapes[Math.floor(Math.random() * shapes.length)],
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 10,
      wobble: Math.random() * Math.PI * 2,
      wobbleV: Math.random() * 0.08 + 0.03,
      opacity: 1
    };
  }

  const pieces = Array.from({ length: 250 }, (_, i) => makePiece(i));

  function drawStar(ctx, cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](cx + r * Math.cos(a), cy + r * Math.sin(a));
    }
    ctx.closePath();
    ctx.fill();
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.wobble += p.wobbleV;
      p.x += p.vx + Math.sin(p.wobble) * 0.8;
      p.y += p.vy;
      p.rot += p.rotV;
      p.vy += 0.04;
      if (frame > 200) p.opacity = Math.max(0, p.opacity - 0.008);
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.size / 2, -p.size * 0.3, p.size, p.size * 0.6);
      } else if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        drawStar(ctx, 0, 0, p.size / 2);
      }
      ctx.restore();
    });
    frame++;
    if (frame < 350) requestAnimationFrame(draw);
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  draw();
}

/* =====================================================
   GAME MENU (mid-game settings)
   ===================================================== */
function showGameMenu() {
  // Remove any existing overlay
  const existing = document.getElementById('game-menu-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'game-menu-overlay';
  overlay.className = 'game-menu-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeGameMenu(); };

  overlay.innerHTML = `
    <div class="game-menu-sheet">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h3 style="margin:0;font-size:1.2rem;">${T('gameSettings')}</h3>
        <button class="btn-ghost" onclick="closeGameMenu()" style="font-size:1.4rem;padding:2px 8px;">✕</button>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn" onclick="closeGameMenu();returnToGame();"
          style="background:linear-gradient(135deg,#6C63FF,#9B59B6);color:#fff;border:none;">
          ${T('returnToGame')}
        </button>
        <button class="btn" onclick="returnToSetup()"
          style="background:transparent;border:1px solid var(--border);color:var(--text-muted);">
          ${T('editSettings')}

          style="background:transparent;border:1px solid #f87171;color:#f87171;">
          ${T('endGame')}
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('open'));
}

function closeGameMenu() {
  const overlay = document.getElementById('game-menu-overlay');
  if (!overlay) return;
  overlay.classList.remove('open');
  setTimeout(() => overlay.remove(), 250);
}

function returnToSetup() {
  closeGameMenu();
  // Save exact screen to return to
  G._returnScreen = G.screen;
  // Pause timer if mid-turn
  if (G.playing && G.playing.timerInterval) {
    clearInterval(G.playing.timerInterval);
    G.playing.timerInterval = null;
    G.playing.paused = true;
  }
  // Save full state including mid-turn progress
  saveGame();
  // Sync setupTeams from current game state so edits resume correctly
  setupTeams = G.teams.map(t => ({
    name: t.name, color: t.color, emoji: t.emoji,
    players: [...(t.players||[])], diffOffset: t.diffOffset||0, lang: t.lang||'he'
  }));
  G.screen = 'gameOptions';
  render();
}

function returnToGame() {
  const dest = G._returnScreen || 'board';
  G._returnScreen = null;
  G.screen = dest;
  render();
  // If returning to mid-turn, show in paused state so player can resume when ready
  if (dest === 'playing' && G.playing) {
    G.playing.paused = true;
    if (G.playing.timerInterval) { clearInterval(G.playing.timerInterval); G.playing.timerInterval = null; }
    const wc = document.getElementById('word-card');
    if (wc) wc.style.filter = 'blur(8px)';
    const pb = document.getElementById('pause-btn');
    if (pb) pb.textContent = TT(G.playing.lang || 'he', 'resume');
    ['btn-skip','btn-correct'].forEach(id => {
      const b = document.getElementById(id);
      if (b) { b.disabled = true; b.style.opacity = '0.35'; b.style.pointerEvents = 'none'; }
    });
  }
}

function exitToHome() {
  closeGameMenu();
  clearSavedGame();
  G.gameActive = false;
  G._returnScreen = null;
  G.screen = 'modeSelect';
  render();
}

/* =====================================================
   AVATAR ANIMATION
   ===================================================== */
function animateAvatarOnBoard() {
  const lm = G.lastMove;
  if (!lm || lm.to <= lm.from) return;
  const team = G.teams[lm.teamIdx];
  if (!team) return;

  const pathEls = [];
  for (let t = lm.from; t <= lm.to; t++) {
    const el = t === 0
      ? document.querySelector('.trail-start-tile')
      : document.getElementById('gtile-' + t);
    if (el) pathEls.push(el);
  }
  if (pathEls.length < 2) return;

  const pawn = document.createElement('div');
  pawn.style.cssText = 'position:fixed;z-index:999;pointer-events:none;font-size:1.8rem;line-height:1;' +
    'filter:drop-shadow(0 2px 8px rgba(0,0,0,0.85));transition:left 0.15s ease,top 0.15s ease,transform 0.15s ease;' +
    'transform:translate(-50%,-55%) scale(1.4);will-change:left,top;';
  pawn.textContent = team.emoji;
  document.body.appendChild(pawn);

  const center = el => {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  };

  const c0 = center(pathEls[0]);
  pawn.style.left = c0.x + 'px';
  pawn.style.top  = c0.y + 'px';

  const stepMs = Math.max(70, Math.min(250, 1600 / (lm.to - lm.from)));
  let i = 1;

  function step() {
    if (i >= pathEls.length) {
      pawn.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s ease';
      pawn.style.transform = 'translate(-50%,-55%) scale(2.2)';
      setTimeout(() => { pawn.style.opacity = '0'; setTimeout(() => pawn.remove(), 300); }, 350);
      return;
    }
    const c = center(pathEls[i]);
    pawn.style.left = c.x + 'px';
    pawn.style.top  = c.y + 'px';
    pawn.style.transform = 'translate(-50%,-55%) scale(' + (1.3 + (i % 2) * 0.15) + ')';
    i++;
    setTimeout(step, stepMs);
  }

  setTimeout(step, 80);
}

/* =====================================================
   BACK NAVIGATION
   ===================================================== */
function goBack() {
  const backMap = {
    home: 'modeSelect',
    instructions: 'home',
    setup: G.gameActive ? 'board' : 'home',
    gameOptions: 'setup',
    board: null,
    turnIntro: 'board',
    playing: null,
    bonusGuess: null,
    turnResults: 'board',
    win: 'modeSelect'
  };
  const dest = backMap[G.screen];
  if (dest === null) return;
  if (dest) { G.screen = dest; render(); }
}

/* =====================================================
   VERSION CHECK — auto-update on new deploy
   ===================================================== */
function checkForUpdate() {
  // 1. Ask the SW to check for updates (handles the case where
  //    the OLD code didn't have version.json logic at all)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(reg => {
      reg.update().catch(() => {});
    });
  }
  // 2. Fetch version.json directly from network, bypassing SW
  //    Using a full URL with cache-bust to avoid any SW interception
  fetch('/version.json?_=' + Date.now(), { cache: 'no-store' })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data || !data.version) return;
      if (data.version === APP_VERSION) return;
      console.log('[Update] New version ' + data.version + ' (current: ' + APP_VERSION + ')');
      forceUpdate();
    })
    .catch(() => {}); // offline — skip check silently
}

function forceUpdate() {
  var done = Promise.resolve();
  // Clear all SW caches
  if ('caches' in window) {
    done = caches.keys().then(names => Promise.all(names.map(n => caches.delete(n))));
  }
  // Unregister all service workers
  if ('serviceWorker' in navigator) {
    done = done.then(() =>
      navigator.serviceWorker.getRegistrations().then(regs =>
        Promise.all(regs.map(r => r.unregister()))
      )
    );
  }
  // Reload after cleanup
  done.then(() => location.reload(true));
}

/* =====================================================
   INIT
   ===================================================== */
// Expose globals so module scripts can access them
window.WORD_LISTS = WORD_LISTS;
window.render = render;
window.G = G;
window.launchConfetti = launchConfetti;
render();
checkForUpdate();

<script>
(function() {
  var DISMISSED_KEY = 'pwa_install_dismissed_v2';
  var DISMISSED_TTL = 7 * 24 * 60 * 60 * 1000;

  function shouldShow() {
    if (window.matchMedia('(display-mode: standalone)').matches) return false;
    if (window.navigator.standalone) return false;
    if (!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) return false;
    try {
      var ts = localStorage.getItem(DISMISSED_KEY);
      if (ts && Date.now() - Number(ts) < DISMISSED_TTL) return false;
    } catch(e) {}
    return true;
  }

  function dismiss() {
    try { localStorage.setItem(DISMISSED_KEY, String(Date.now())); } catch(e) {}
    var banner = document.getElementById('pwa-banner');
    if (!banner) return;
    banner.style.transform = 'translateY(120%)';
    setTimeout(function() { if (banner.parentNode) banner.parentNode.removeChild(banner); }, 400);

    var installBtnHTML = showInstallBtn ? '<button id="pwa-install-btn" style="background:#fff;color:#6C63FF;border:none;border-radius:12px;padding:9px 15px;font-weight:700;font-size:0.88rem;cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);">' + t.install + '</button>' : '';
    banner.innerHTML = '<div style="font-size:2rem;flex-shrink:0;line-height:1">📝</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:0.95rem;line-height:1.2">' + t.title + '</div><div style="font-size:0.78rem;opacity:0.88;margin-top:3px;line-height:1.4">' + desc + '</div></div>' + installBtnHTML + '<button id="pwa-dismiss-btn" style="background:rgba(255,255,255,0.18);border:none;border-radius:8px;width:30px;height:30px;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>';

    document.body.appendChild(banner);
    requestAnimationFrame(function() { requestAnimationFrame(function() { banner.style.transform = 'translateY(0)'; }); });

    document.getElementById('pwa-dismiss-btn').onclick = dismiss;
    var installBtn = document.getElementById('pwa-install-btn');
    if (installBtn) {
      installBtn.onclick = function() {
        if (prompt) { prompt.prompt(); prompt.userChoice.then(function() { window.__pwaPrompt = null; }); }
        dismiss();
      };
    }
  }

  if (!shouldShow()) return;

  var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) && !window.MSStream;

  setTimeout(function() {
    if (isIOS) showBanner('ios', null);
    else if (window.__pwaPrompt) showBanner('android-native', window.__pwaPrompt);
